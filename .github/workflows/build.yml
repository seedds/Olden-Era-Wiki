name: Build & Release

on:
  push:
    branches: [main]

# Only allow one build at a time; cancel in-progress runs on new pushes.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.44.2'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Determine the next version number ──────────────────────────────────
  version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
      name: ${{ steps.bump.outputs.name }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # need full history for tag listing

      - name: Compute next version
        id: bump
        run: |
          # Find the latest vN tag, default to v0 if none exists.
          latest=$(git tag --list 'v[0-9]*' --sort=-version:refname | head -n1)
          if [ -z "$latest" ]; then
            next=1
          else
            num=${latest#v}
            next=$((num + 1))
          fi
          echo "tag=v${next}" >> "$GITHUB_OUTPUT"
          echo "name=v${next}" >> "$GITHUB_OUTPUT"
          echo "Next version: v${next}"

  # ── Android APK ────────────────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: build/app/outputs/flutter-apk/app-release.apk

  # ── iOS (unsigned) ─────────────────────────────────────────────────────
  build-ios:
    runs-on: macos-14 # Apple Silicon — faster than Intel runners
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (unsigned)
        run: flutter build ios --release --no-codesign

      - name: Archive .app to zip
        run: |
          cd build/ios/iphoneos
          zip -r ../../../OldenEraWiki-ios-unsigned.zip Runner.app

      - uses: actions/upload-artifact@v4
        with:
          name: ios
          path: OldenEraWiki-ios-unsigned.zip

  # ── Create GitHub Release ──────────────────────────────────────────────
  release:
    runs-on: ubuntu-latest
    needs: [version, build-android, build-ios]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v4
        with:
          name: apk
          path: artifacts

      - uses: actions/download-artifact@v4
        with:
          name: ios
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: ${{ needs.version.outputs.name }}
          generate_release_notes: true
          files: |
            artifacts/app-release.apk
            artifacts/OldenEraWiki-ios-unsigned.zip
