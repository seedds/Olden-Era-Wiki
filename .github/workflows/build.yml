name: Build & Release

on:
  push:
    branches: [main]

# Only allow one build at a time; cancel in-progress runs on new pushes.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.44.2'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Determine the next version number ──────────────────────────────────
  version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
      name: ${{ steps.bump.outputs.name }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # need full history for tag listing

      - name: Compute next version
        id: bump
        run: |
          # Find the latest vX.Y.Z tag, default to v1.0.0 if none exists.
          latest=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -n1)
          if [ -z "$latest" ]; then
            next="1.0.0"
          else
            # Strip the leading 'v', split into major.minor.patch, bump patch.
            ver=${latest#v}
            major=$(echo "$ver" | cut -d. -f1)
            minor=$(echo "$ver" | cut -d. -f2)
            patch=$(echo "$ver" | cut -d. -f3)
            next="${major}.${minor}.$((patch + 1))"
          fi
          echo "tag=v${next}" >> "$GITHUB_OUTPUT"
          echo "name=v${next}" >> "$GITHUB_OUTPUT"
          echo "Next version: v${next}"

  # ── Android APK ────────────────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    needs: version
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (arm64)
        run: flutter build apk --release --target-platform android-arm64 --build-number=${{ github.run_number }}

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/OldenEraWiki-${{ needs.version.outputs.name }}-android.apk

      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: build/app/outputs/flutter-apk/OldenEraWiki-${{ needs.version.outputs.name }}-android.apk

  # ── iOS (unsigned) ─────────────────────────────────────────────────────
  build-ios:
    runs-on: macos-14 # Apple Silicon — faster than Intel runners
    needs: version
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (unsigned)
        run: flutter build ios --release --no-codesign

      - name: Package unsigned .ipa
        run: |
          cd build/ios/iphoneos
          mkdir Payload
          mv Runner.app Payload/
          zip -r ../../../OldenEraWiki-${{ needs.version.outputs.name }}-ios-unsigned.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: ios
          path: OldenEraWiki-${{ needs.version.outputs.name }}-ios-unsigned.ipa

  # ── Create GitHub Release ──────────────────────────────────────────────
  release:
    runs-on: ubuntu-latest
    needs: [version, build-android, build-ios]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # need history for changelog

      - name: Build changelog
        id: changelog
        run: |
          # Find the previous release tag.
          prev=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -n1)
          if [ -z "$prev" ]; then
            # First release — list all commits.
            log=$(git log --pretty=format:'- %s' --reverse)
          else
            log=$(git log "${prev}..HEAD" --pretty=format:'- %s' --reverse)
          fi
          # Write multi-line output.
          {
            echo "body<<CHANGELOG_EOF"
            echo "## What's Changed"
            echo ""
            echo "$log"
            echo ""
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          name: apk
          path: artifacts

      - uses: actions/download-artifact@v4
        with:
          name: ios
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: ${{ needs.version.outputs.name }}
          body: ${{ steps.changelog.outputs.body }}
          files: |
            artifacts/OldenEraWiki-*-android.apk
            artifacts/OldenEraWiki-*-ios-unsigned.ipa
